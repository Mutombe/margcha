<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Margcha Shopfitting - Premium aluminium fabrication, joinery, and shopfitting solutions in Zimbabwe. Quality craftsmanship for commercial and residential spaces." />
    <meta name="keywords" content="shopfitting, aluminium fabrication, joinery, glass products, windows, doors, partitions, Zimbabwe, Harare" />
    <meta name="author" content="Margcha Shopfitting" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#631414" />

    <!-- Only 2 fonts: Raleway for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">

    <title>Margcha Shopfitting | Premium Aluminium & Glass Solutions</title>
    <script>
      // Apply theme before render to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
